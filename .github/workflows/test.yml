name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  offline-harness-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s tests -v
      - run: python -m py_compile *.py
